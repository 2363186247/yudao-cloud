version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0.36
    container_name: yudao-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=ruoyi-vue-pro
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: always

  # Redis 缓存
  redis:
    image: redis:7.2.4
    container_name: yudao-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # Nacos 注册/配置中心 (使用内嵌 Derby 数据库，免配置)
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: yudao-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
    restart: always

  # MongoDB 数据库
  mongodb:
    image: mongo:6.0.14
    container_name: yudao-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=admin
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  mysql_data:
  redis_data:
  mongodb_data:
