version: '3'
services:
  mongodb:
    image: mongo:6.0.14
    container_name: yudao-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=admin
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  mongodb_data:
