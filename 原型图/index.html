<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>境外舆情分析系统 - 工作台</title>
  <link rel="stylesheet" href="./assets/css/reset.css" />
  <link rel="stylesheet" href="./assets/css/theme.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/page.css" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: #13233f;
      background: #f3f7fd;
    }

    body {
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .workbench {
      width: 100%;
      min-height: calc(100vh - 106px);
      padding: 0;
      background: transparent;
    }

    .workbench-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      height: 48px;
      margin-bottom: 22px;
    }

    .page-title {
      margin: 0;
      color: #10213f;
      font-size: 38px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 22px;
      color: #1a2944;
      font-size: 18px;
      font-weight: 500;
      white-space: nowrap;
    }

    .date-item,
    .user-box {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .top-divider {
      width: 1px;
      height: 24px;
      background: #d6e0ee;
    }

    .top-icon {
      display: inline-grid;
      width: 24px;
      height: 24px;
      place-items: center;
      color: #1c2c49;
      font-size: 21px;
      line-height: 1;
    }

    .avatar {
      display: grid;
      width: 26px;
      height: 26px;
      place-items: center;
      overflow: hidden;
      border-radius: 50%;
      color: #fff;
      background: linear-gradient(145deg, #1d66db, #f59f6a);
      font-size: 13px;
      font-weight: 800;
    }

    .welcome-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .welcome-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .badge-emblem {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      border: 1px solid #d7e4f5;
      border-radius: 50%;
      color: #0e62d7;
      background:
        radial-gradient(circle, #fff 0 42%, #dfeeff 43% 59%, #fff 60%),
        linear-gradient(135deg, #fff, #eaf3ff);
      box-shadow: 0 4px 12px rgba(30, 99, 214, 0.12);
      font-size: 25px;
      font-weight: 900;
    }

    .welcome-title {
      margin: 0;
      color: #172744;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 900;
    }

    .welcome-subtitle {
      margin: 8px 0 0;
      color: #566985;
      font-size: 16px;
      line-height: 1.3;
    }

    .layout-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      height: 44px;
      padding: 0 18px;
      border: 1px solid #d7e3f2;
      border-radius: 8px;
      color: #21324f;
      background: #fff;
      box-shadow: 0 4px 14px rgba(30, 99, 214, 0.08);
      font-size: 16px;
      font-weight: 800;
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
      grid-template-areas:
        "hero summary"
        "search risk"
        "dynamic hotwords";
      gap: 16px;
      align-items: start;
    }

    .card {
      border: 1px solid #d7e3f2;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 6px 18px rgba(42, 92, 160, 0.07);
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: 34px;
      margin-bottom: 12px;
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      color: #172744;
      font-size: 18px;
      line-height: 1;
      font-weight: 900;
    }

    .card-title::before {
      content: "";
      width: 4px;
      height: 22px;
      border-radius: 999px;
      background: #1f6fea;
    }

    .more {
      border: 0;
      color: #1d66db;
      background: transparent;
      font-size: 14px;
      font-weight: 800;
    }

    .hero-card {
      grid-area: hero;
      position: relative;
      display: flex;
      min-height: 170px;
      overflow: hidden;
      align-items: center;
      justify-content: space-between;
      padding: 42px 0 38px 42px;
      background:
        linear-gradient(90deg, rgba(226, 237, 255, 0.98) 0%, rgba(234, 243, 255, 0.86) 43%, rgba(214, 230, 255, 0.34) 100%),
        #e9f2ff;
    }

    .hero-copy {
      position: relative;
      z-index: 2;
      flex: 0 0 45%;
    }

    .hero-card h2 {
      margin: 0 0 14px;
      color: #1261d4;
      font-size: 38px;
      line-height: 1.1;
      font-weight: 900;
    }

    .hero-card p {
      margin: 0;
      color: #183153;
      font-size: 18px;
      font-weight: 800;
    }

    .hero-art {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 58%;
      height: 100%;
      background: linear-gradient(90deg, rgba(233, 242, 255, 0.1), rgba(233, 242, 255, 0)), url("./assets/img/dashboard-hero-reference.png") center right / cover no-repeat;
    }

    .summary-card {
      grid-area: summary;
      min-height: 170px;
      padding: 18px 20px 20px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      height: calc(100% - 46px);
      align-items: center;
    }

    .stat-box {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      height: 126px;
      padding: 0 14px;
      border: 1px solid #dce6f4;
      border-radius: 10px;
      background: #fff;
    }

    .stat-icon {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 12px;
      color: #fff;
      font-size: 26px;
      font-weight: 900;
    }

    .blue { background: linear-gradient(135deg, #0f69e8, #2d8cff); }
    .cyan { background: linear-gradient(135deg, #208cf1, #42c5ff); }
    .red { background: linear-gradient(135deg, #ef3434, #ff736e); }
    .purple { background: linear-gradient(135deg, #7252df, #9e6cff); }
    .green { background: linear-gradient(135deg, #15ad94, #23cfb6); }
    .orange { background: linear-gradient(135deg, #ff8a2a, #ffb14d); }
    .yellow { background: linear-gradient(135deg, #ffa72b, #ffd061); }

    .stat-name {
      overflow: hidden;
      color: #677792;
      font-size: 14px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stat-value {
      margin-top: 9px;
      color: #162744;
      font-size: 27px;
      line-height: 1;
      font-weight: 900;
    }

    .stat-change {
      margin-top: 10px;
      color: #ff1d1d;
      font-size: 13px;
      font-weight: 800;
    }



    .app-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px 36px;
      padding: 8px 10px 0;
    }

    .app-tile {
      display: grid;
      height: 98px;
      place-items: center;
      align-content: center;
      gap: 10px;
      border: 1px solid #dce6f4;
      border-radius: 10px;
      color: #20304d;
      background: #fbfdff;
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
    }

    .app-icon {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      font-size: 26px;
      line-height: 1;
      font-weight: 900;
    }

    .search-card {
      grid-area: search;
      min-height: 210px;
      padding: 18px 20px 22px;
    }

    .search-line {
      display: grid;
      grid-template-columns: 126px minmax(0, 1fr) 88px;
      gap: 10px;
      margin-top: 10px;
    }

    .control {
      width: 100%;
      height: 42px;
      border: 1px solid #d7e3f2;
      border-radius: 8px;
      color: #263854;
      background: #fff;
      font-size: 14px;
    }

    select.control {
      padding: 0 12px;
    }

    input.control {
      padding: 0 14px;
    }

    .search-btn {
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: #1767de;
      box-shadow: 0 6px 14px rgba(23, 103, 222, 0.22);
      font-size: 15px;
      font-weight: 900;
    }

    .hot-label {
      margin: 30px 0 12px;
      color: #263854;
      font-size: 15px;
      font-weight: 900;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .tag {
      min-width: 66px;
      height: 32px;
      padding: 0 13px;
      border: 1px solid #d9e5f4;
      border-radius: 6px;
      color: #29405d;
      background: #f4f8ff;
      font-size: 14px;
      font-weight: 800;
    }

    .risk-todo-card {
      grid-area: risk;
      min-height: 210px;
      padding: 18px 20px;
    }

    .risk-todo-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .risk-list {
      display: grid;
      gap: 0;
      margin-top: 8px;
    }

    .risk-item {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 46px 72px;
      gap: 10px;
      align-items: center;
      min-height: 58px;
      border-bottom: 1px solid #e5edf7;
    }

    .risk-item:last-child {
      border-bottom: 0;
    }

    .risk-icon {
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
    }

    .risk-name {
      color: #21324f;
      font-size: 15px;
      font-weight: 800;
    }

    .risk-num {
      color: #172744;
      font-size: 24px;
      text-align: right;
      font-weight: 900;
    }

    .risk-change {
      color: #77869c;
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }

    .risk-change b {
      color: #ff1d1d;
    }

    .panel-card {
      min-height: 230px;
      padding: 18px 20px;
    }

    .system-layout .workbench-topbar {
      height: 40px;
      margin-bottom: 14px;
    }

    .system-layout .page-title {
      font-size: 32px;
    }

    .system-layout .top-actions {
      gap: 18px;
      font-size: 16px;
    }

    .system-layout .welcome-row {
      margin-bottom: 18px;
    }

    .system-layout .welcome-title {
      font-size: 20px;
    }

    .system-layout .welcome-subtitle {
      margin-top: 6px;
      font-size: 14px;
    }

    .system-layout .layout-btn {
      height: 40px;
    }

    .system-layout .hero-card,
    .system-layout .summary-card {
      height: 188px;
    }

    .system-layout .hero-card {
      padding: 32px 0 30px 42px;
    }

    .system-layout .hero-card h2 {
      font-size: 34px;
    }

    .system-layout .hero-card p {
      font-size: 16px;
    }

    .system-layout .summary-card {
      padding: 16px 20px;
    }

    .system-layout .stat-grid {
      height: calc(100% - 42px);
      gap: 10px;
    }

    .system-layout .stat-box {
      height: 96px;
      gap: 12px;
      padding: 0 12px;
    }

    .system-layout .stat-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      font-size: 22px;
    }

    .system-layout .stat-name {
      font-size: 13px;
    }

    .system-layout .stat-value {
      margin-top: 7px;
      font-size: 25px;
    }

    .system-layout .stat-change {
      margin-top: 8px;
      font-size: 12px;
    }

    .system-layout .search-card,
    .system-layout .risk-todo-card {
      height: 256px;
      padding: 16px 20px;
    }

    .system-layout .app-grid {
      gap: 12px 34px;
      padding-top: 4px;
    }

    .system-layout .app-tile {
      height: 80px;
      gap: 8px;
      font-size: 14px;
    }

    .system-layout .app-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      font-size: 22px;
    }

    .system-layout .search-line {
      margin-top: 6px;
    }

    .system-layout .hot-label {
      margin: 22px 0 10px;
    }

    .system-layout .tag-list {
      gap: 8px;
    }

    .system-layout .tag {
      height: 30px;
      min-width: 60px;
      padding: 0 12px;
      font-size: 13px;
    }

    .system-layout .risk-item {
      min-height: 48px;
    }

    .system-layout .risk-num {
      font-size: 22px;
    }

    .system-layout .panel-card {
      height: 286px;
      padding: 16px 20px;
    }

    .system-layout .news-item,
    .system-layout .follow-item {
      min-height: 33px;
      font-size: 13px;
    }

    .system-layout .word-tags {
      gap: 10px;
      padding-top: 10px;
    }

    .system-layout .word {
      height: 34px;
      min-width: 72px;
      padding: 0 14px;
      font-size: 14px;
    }

    .system-layout .word.big,
    .system-layout .word.mid {
      height: 46px;
      min-width: 132px;
      font-size: 26px;
    }

    .system-layout .word.mid {
      min-width: 126px;
      font-size: 23px;
    }

    .system-layout .todo-item {
      min-height: 44px;
      font-size: 14px;
    }

    .dynamic-card { grid-area: dynamic; }
    .hotwords-card { grid-area: hotwords; }

    .tabs {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .tab {
      position: relative;
      border: 0;
      color: #677792;
      background: transparent;
      font-size: 14px;
      font-weight: 800;
    }

    .tab.active {
      color: #1767de;
    }

    .tab.active::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: -9px;
      left: 0;
      height: 2px;
      border-radius: 999px;
      background: #1767de;
    }

    .news-list,
    .follow-list,
    .todo-list {
      display: grid;
      gap: 0;
      margin-top: 8px;
    }

    .news-item {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) 76px 48px;
      gap: 10px;
      align-items: center;
      min-height: 39px;
      color: #263854;
      font-size: 14px;
    }

    .news-index {
      display: grid;
      width: 20px;
      height: 20px;
      place-items: center;
      border-radius: 5px;
      color: #ff2f2f;
      background: #ffe9e6;
      font-weight: 900;
    }

    .news-title,
    .follow-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }

    .source,
    .time {
      color: #667792;
      font-size: 13px;
    }

    .time {
      text-align: right;
    }

    .follow-item {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) 76px 48px;
      gap: 10px;
      align-items: center;
      min-height: 39px;
      color: #263854;
      font-size: 14px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #1767de;
    }

    .word-tags {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      justify-content: center;
      gap: 12px;
      padding: 14px 8px 0;
    }

    .word {
      display: inline-flex;
      min-width: 78px;
      height: 38px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 8px;
      color: #0961d7;
      background: #f0f6ff;
      font-size: 15px;
      font-weight: 900;
    }

    .word.big {
      min-width: 150px;
      height: 52px;
      color: #0961d7;
      font-size: 29px;
      letter-spacing: 0;
    }

    .word.mid {
      min-width: 142px;
      height: 52px;
      font-size: 25px;
    }

    .todo-item {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) 36px;
      gap: 10px;
      align-items: center;
      min-height: 55px;
      border-bottom: 1px solid #e5edf7;
      color: #263854;
      font-size: 15px;
      font-weight: 800;
    }

    .todo-item:last-child {
      border-bottom: 0;
    }

    .todo-icon {
      display: grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border: 1px solid currentColor;
      border-radius: 5px;
      color: #1767de;
      font-size: 14px;
      font-weight: 900;
    }

    .todo-icon.red { color: #ff2f2f; background: transparent; }
    .todo-icon.orange { color: #ff8a2a; background: transparent; }

    .todo-badge {
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border-radius: 50%;
      color: #f04438;
      background: #ffe9e6;
      font-size: 14px;
      font-weight: 900;
    }

    .system-layout .content-area {
      padding: 18px 32px 28px;
    }

    .system-layout .workbench-topbar {
      height: 54px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #d9e3f0;
    }

    .system-layout .page-title {
      font-size: 32px;
    }

    .system-layout .top-actions {
      gap: 20px;
      font-size: 16px;
    }

    .system-layout .welcome-row {
      margin-bottom: 18px;
    }

    .system-layout .dashboard {
      grid-template-columns: minmax(0, 1.04fr) minmax(0, 1fr);
      grid-template-areas:
        "hero summary"
        "search risk"
        "dynamic hotwords";
      gap: 14px 16px;
    }

    .system-layout .hero-card,
    .system-layout .summary-card {
      height: 202px;
      min-height: 202px;
    }

    .system-layout .hero-card {
      padding: 32px 0 30px 30px;
    }

    .system-layout .hero-copy {
      flex-basis: 42%;
    }

    .system-layout .hero-card h2 {
      font-size: 31px;
    }

    .system-layout .hero-card p {
      font-size: 16px;
    }

    .system-layout .hero-art {
      width: 55%;
      background-size: cover;
    }

    .system-layout .summary-card {
      padding: 20px;
    }

    .system-layout .summary-card .card-head,
    .system-layout .search-card .card-head,
    .system-layout .risk-todo-card .card-head,
    .system-layout .panel-card .card-head {
      height: 30px;
      margin-bottom: 14px;
    }

    .system-layout .stat-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      height: auto;
    }

    .system-layout .stat-box {
      height: 126px;
      align-items: center;
      gap: 14px;
      padding: 0 16px;
    }

    .system-layout .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      font-size: 24px;
    }

    .system-layout .stat-name {
      font-size: 13px;
    }

    .system-layout .stat-value {
      margin-top: 8px;
      font-size: 26px;
    }

    .system-layout .stat-change {
      display: block;
      margin-top: 10px;
    }

    .system-layout .search-card,
    .system-layout .risk-todo-card {
      height: 276px;
      min-height: 276px;
      padding: 20px;
    }

    .system-layout .search-line {
      grid-template-columns: 128px minmax(0, 1fr) 120px;
      margin-top: 0;
    }

    .system-layout .hot-label {
      margin: 12px 0 10px;
    }

    .system-layout .tag-list {
      gap: 9px;
      margin-bottom: 14px !important;
    }

    .system-layout .tag {
      height: 30px;
      min-width: 66px;
      padding: 0 13px;
    }

    .system-layout .search-card .app-grid {
      grid-template-columns: repeat(5, minmax(0, 1fr)) !important;
      gap: 12px !important;
      padding: 0 !important;
    }

    .system-layout .search-card .app-tile {
      height: 56px !important;
      gap: 6px;
      font-size: 13px !important;
    }

    .system-layout .search-card .app-icon {
      width: 30px !important;
      height: 30px !important;
      font-size: 15px !important;
      border-radius: 9px;
    }

    .system-layout .risk-todo-split {
      grid-template-columns: 1fr 1fr;
      gap: 26px;
    }

    .system-layout .risk-item {
      grid-template-columns: 28px minmax(0, 1fr) 38px;
      min-height: 42px;
      gap: 8px;
    }

    .system-layout .risk-icon {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      font-size: 13px;
    }

    .system-layout .risk-name {

  <script src="./assets/js/menu-config.js"></script>
  <script src="./assets/js/mock-data.js"></script>
  <script src="./assets/js/layout.js"></script>
  <script>
    (function () {
      const pageContent = document.getElementById("pageContent");
      const template = document.getElementById("workbenchTemplate");
      if (!pageContent || !template) return;

      pageContent.innerHTML = template.innerHTML;
      normalizeRootShellLinks();
      normalizeTopbarUser();
      bindWorkbenchEvents();
      window.setTimeout(initLatestDynamicReminder, 0);
    })();

    function normalizeRootShellLinks() {
      document.querySelectorAll(".sidebar a[href^='./'], .brand-box[href^='./']").forEach((link) => {
        const href = link.getAttribute("href");
        if (!href || href === "#" || href.startsWith("./pages/")) return;
        link.setAttribute("href", "./pages/" + href.slice(2));
      });
    }

    function normalizeTopbarUser() {
      const avatar = document.querySelector(".topbar .user-avatar");
      const name = document.querySelector(".topbar .user-info span:nth-child(2)");
      if (avatar) avatar.textContent = "张";
      if (name) name.textContent = "张警官";
    }

    function bindWorkbenchEvents() {
      const searchButton = document.querySelector(".search-btn");
      const searchInput = document.querySelector(".search-line input");
      const searchSelect = document.querySelector(".search-line select");

      searchButton?.addEventListener("click", () => {
        const keyword = (searchInput?.value || "").trim();
        const scope = searchSelect?.value || "全部领域";
        const query = new URLSearchParams({ keyword, scope });
        location.href = "./pages/search-info.html?" + query.toString();
      });

      document.querySelectorAll(".tag, .word").forEach((button) => {
        button.addEventListener("click", () => {
          const keyword = button.textContent.trim();
          location.href = "./pages/search-info.html?keyword=" + encodeURIComponent(keyword);
        });
      });

      document.querySelectorAll("[data-href]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          location.href = button.dataset.href;
        });
      });

      document.addEventListener("click", (event) => {
        const trigger = event.target.closest(".news-item[data-href]");
        if (!trigger) return;
        location.href = trigger.dataset.href;
      });

      document.querySelector(".layout-btn")?.addEventListener("click", () => {
        showWorkbenchToast("自定义布局已打开");
      });

      document.querySelectorAll("[data-focus-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-focus-tab]").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          renderFocusList(button.dataset.focusTab);
        });
      });
    }

    function renderFocusList(type) {
      const data = {
        hot: [
          ["某网络直播平台网络主播整改行动", "瞭望社", "10:20"],
          ["美国公布新版国家网络安全战略", "澎湃社", "09:15"],
          ["东南亚国家加强跨境打击电信诈骗合作", "新华社", "08:40"],
          ["美韩联合演练网络攻防提升防御能力", "环球社", "07:30"],
          ["欧盟通过《人工智能法案》实施细则", "法新社", "06:10"],
        ],
        international: [
          ["美欧就对俄新一轮制裁达成一致", "路透社", "10:24"],
          ["美联储暗示今年可能降息", "彭博社", "09:58"],
          ["日本将加强半导体产业合作", "NHK", "08:41"],
          ["欧盟通过新数字服务法案", "BBC", "07:33"],
          ["印度与加拿大外交关系紧张升级", "Al Jazeera", "06:15"],
        ],
        domestic: [
          ["多地发布数字经济重点项目清单", "新华社", "10:18"],
          ["人工智能治理标准持续完善", "央视新闻", "09:42"],
          ["新能源产业链协同能力提升", "经济日报", "08:36"],
          ["跨境数据流动安全评估推进", "人民网", "07:58"],
          ["重点区域网络安全演练启动", "光明网", "06:44"],
        ]
      };
      const list = document.querySelector(".dynamic-card .news-list");
      if (!list) return;
      list.innerHTML = (data[type] || data.hot)
        .map(
          (item, index) => `
              <div class="news-item" data-href="./pages/info-detail.html?id=D20260525${String(index + 1).padStart(4, "0")}">
                <span class="${type === "hot" ? "news-index" : "news-dot"}">${type === "hot" ? index + 1 : ""}</span>
                <span class="news-title">${item[0]}</span>
                <span class="source">${item[1]}</span>
                <span class="time">${item[2]}</span>
              </div>
            `
        )
        .join("");
    }

    const LATEST_DYNAMIC_API = "/api/workbench/dynamics/latest";
    const LATEST_DYNAMIC_READ_KEY = "workbenchLatestDynamicReadId";
    const latestDynamicMock = {
      remindId: "R202605250001",
      type: "monitor",
      monitorId: "TP-2026-040612",
      sourceTask: "专题监测任务",
      intelligenceId: "I202605250089",
      title: "监测到“东南亚电诈专题”相关情报",
      summary: "监测任务发现：某境外社交平台出现与东南亚电诈专题相关的最新舆情信息。",
      level: "high",
      time: "10:20",
      remindTime: "2026-05-25 10:20:00",
      unreadCount: 1,
      isRead: false,
      targetUrl: "./pages/topic-reports.html?id=TP-2026-040612",
      isMock: true,
    };
    let latestDynamicReminder = null;

    function initLatestDynamicReminder() {
      const card = document.getElementById("latestDynamicReminder");
      if (!card) return;

      card.addEventListener("click", () => openLatestDynamicReminder());

      loadLatestDynamicReminder();
      if (!window.latestDynamicReminderTimer && location.protocol !== "file:") {
        window.latestDynamicReminderTimer = window.setInterval(loadLatestDynamicReminder, 60000);
      }
    }

    async function loadLatestDynamicReminder() {
      renderLatestDynamicReminder({ loading: true });

      try {
        const data = await getLatestDynamicData();
        renderLatestDynamicReminder(applyLocalReadState(data));
      } catch (error) {
        console.warn("latest dynamic reminder load failed", error);
        renderLatestDynamicReminder(applyLocalReadState(latestDynamicMock));
      }
    }

    async function getLatestDynamicData() {
      if (location.protocol === "file:") {
        return latestDynamicMock;
      }

      const controller = new AbortController();
      const timer = window.setTimeout(() => controller.abort(), 2500);
      try {
        const response = await fetch(LATEST_DYNAMIC_API, { signal: controller.signal });
        if (!response.ok) throw new Error("latest dynamic api failed");
        const result = await response.json();
        return result && result.code === 200 ? result.data || latestDynamicMock : latestDynamicMock;
      } finally {
        window.clearTimeout(timer);
      }
    }

    function applyLocalReadState(data) {
      if (!data) return null;
      const readId = localStorage.getItem(LATEST_DYNAMIC_READ_KEY);
      if (readId === data.remindId) {
        return { ...data, isRead: true, unreadCount: 0 };
      }
      return data;
    }

    function renderLatestDynamicReminder(data) {
      const card = document.getElementById("latestDynamicReminder");
      if (!card) return;
      const alert = card.querySelector(".monitor-alert");
      if (!alert) return;

      if (data && data.loading) {
        latestDynamicReminder = null;
        alert.className = "monitor-alert";
        alert.innerHTML = `
          <span class="monitor-type">监测</span>
          <span class="monitor-main">
            <span class="monitor-title-row">
              <span class="monitor-title">正在加载最新动态...</span>
            </span>
          </span>
        `;
        return;
      }

      if (data && data.error) {
        latestDynamicReminder = null;
        alert.className = "monitor-alert error";
        alert.textContent = data.message || "最新动态加载失败，请稍后重试";
        return;
      }

      if (!data) {
        latestDynamicReminder = null;
        alert.className = "monitor-alert empty";
        alert.textContent = "暂无新的监测提醒";
        return;
      }

      latestDynamicReminder = data;
      const typeText = data.type === "monitor" ? "监测" : "提醒";
      const sourceTask = data.sourceTask || data.monitorName || "专题监测任务";
      const time = data.time || formatReminderTime(data.remindTime);

      alert.className = "monitor-alert";
      alert.innerHTML = `
        <span class="monitor-type">${escapeWorkbenchHtml(typeText)}</span>
        <span class="monitor-main">
          <span class="monitor-title-row">
            <span class="monitor-title">${escapeWorkbenchHtml(data.title || "监测到专题相关情报")}</span>
            <span class="monitor-source">${escapeWorkbenchHtml(sourceTask)}</span>
          </span>
          <span class="monitor-summary">${escapeWorkbenchHtml(data.summary || "监测任务发现新的专题情报，请及时查看。")}</span>
        </span>
        <span class="monitor-time">${escapeWorkbenchHtml(time)}</span>
      `;
    }

    async function openLatestDynamicReminder() {
      const data = latestDynamicReminder;
      const targetUrl = data?.targetUrl || data?.detailUrl;
      if (!data || !targetUrl) return;

      if (data.isRead || data.isMock || location.protocol === "file:") {
        markLatestDynamicRead(data);
        location.href = targetUrl;
        return;
      }

      try {
        const response = await fetch(`/api/workbench/dynamics/${encodeURIComponent(data.remindId)}/read`, { method: "PUT" });
        if (!response.ok) throw new Error("mark latest dynamic read failed");
        markLatestDynamicRead(data);
        location.href = targetUrl;
      } catch (error) {
        console.warn("latest dynamic reminder read failed", error);
        showWorkbenchToast("状态更新失败，请稍后重试");
      }
    }

    function markLatestDynamicRead(data) {
      if (data.remindId) {
        localStorage.setItem(LATEST_DYNAMIC_READ_KEY, data.remindId);
      }
      renderLatestDynamicReminder({ ...data, isRead: true, unreadCount: 0 });
    }

    function formatReminderTime(value) {
      if (!value) return "";
      const match = String(value).match(/\d{2}:\d{2}/);
      return match ? match[0] : String(value);
    }

    function escapeWorkbenchHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function showWorkbenchToast(text) {
      let toast = document.getElementById("workbenchToast");
      if (!toast) {
        toast = document.createElement("div");
        toast.id = "workbenchToast";
        toast.className = "workbench-toast";
        document.body.appendChild(toast);
      }
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(showWorkbenchToast.timer);
      showWorkbenchToast.timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }
  </script>
