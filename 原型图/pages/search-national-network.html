<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>境外舆情分析系统 - 全国联网查询</title>
  <link rel="stylesheet" href="../assets/css/reset.css" />
  <link rel="stylesheet" href="../assets/css/theme.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/page.css" />
  <style>
    .national-network-page {
      display: grid;
      gap: 16px;
      color: #102447;
    }

    .national-page-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .national-breadcrumb {
      margin-bottom: 16px;
      color: #5d6c83;
      font-size: 14px;
      font-weight: 600;
    }

    .national-breadcrumb span {
      color: #1677ff;
    }

    .national-title-wrap {
      display: grid;
      grid-template-columns: 5px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .national-title-line {
      width: 5px;
      height: 44px;
      border-radius: 999px;
      background: #1677ff;
    }

    .national-page-head h1 {
      margin: 0;
      color: #102447;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .national-page-head p {
      margin: 10px 0 0;
      color: #5d6c83;
      font-size: 14px;
      line-height: 1.6;
    }

    .national-head-actions {
      display: flex;
      gap: 10px;
      padding-top: 28px;
      white-space: nowrap;
    }

    .national-network-page .btn {
      height: 40px;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 700;
    }

    .national-filter-card,
    .national-result-card {
      border: 1px solid #e4ebf5;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 5px 16px rgba(15, 39, 72, 0.06);
    }

    .national-filter-card {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px 28px;
      align-items: center;
      padding: 22px 26px;
    }

    .national-filter-field {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .national-filter-field label {
      flex: 0 0 90px;
      color: #1f2f46;
      font-size: 14px;
      font-weight: 700;
      line-height: 20px;
      white-space: nowrap;
    }

    .national-filter-field .control {
      width: 100%;
      height: 42px;
      min-width: 0;
      padding: 0 14px;
      border: 1px solid #d8e1ef;
      border-radius: 6px;
      color: #1f2f46;
      font-size: 14px;
      background: #fff;
    }

    .national-filter-field .control::placeholder {
      color: #9aa8ba;
    }

    .national-filter-field .control:focus {
      border-color: #1677ff;
      box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.12);
      outline: none;
    }

    .national-filter-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
      white-space: nowrap;
    }

    .national-filter-spacer {
      min-width: 0;
    }

    .national-result-card {
      padding: 18px;
    }

    .national-card-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .national-card-title h2 {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 0;
      color: #102447;
      font-size: 18px;
      line-height: 1.2;
    }

    .national-card-title h2::before {
      content: "";
      width: 4px;
      height: 22px;
      border-radius: 999px;
      background: #1677ff;
    }

    .national-title-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      color: #5d6c83;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .national-selected-count {
      color: #1677ff;
    }

    .national-table-wrap {
      overflow-x: auto;
    }

    .national-table {
      width: 100%;
      min-width: 1080px;
      border-collapse: separate;
      border-spacing: 0;
      color: #102447;
      font-size: 14px;
    }

    .national-table th {
      padding: 13px 12px;
      color: #3d4b63;
      background: #f6f9fd;
      font-weight: 800;
      text-align: left;
      white-space: nowrap;
    }

    .national-table th:first-child,
    .national-table td:first-child {
      width: 44px;
      text-align: center;
    }

    .national-table td {
      padding: 15px 12px;
      border-bottom: 1px solid #edf2f8;
      font-weight: 600;
      vertical-align: middle;
      white-space: nowrap;
    }

    .national-table tbody tr {
      cursor: pointer;
    }

    .national-table tbody tr:hover td {
      background: #f8fbff;
    }

    .national-table tbody tr.is-checked td {
      background: #f1f7ff;
    }

    .national-checkbox {
      width: 16px;
      height: 16px;
      accent-color: #1677ff;
      cursor: pointer;
    }

    .national-status-tag {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }

    .national-status-tag.linked {
      color: #079455;
      background: #eafbf2;
    }

    .national-status-tag.pending {
      color: #f79009;
      background: #fff4e5;
    }

    .national-status-tag.unlinked {
      color: #667085;
      background: #f2f4f7;
    }

    .national-text-btn {
      border: 0;
      color: #1677ff;
      background: transparent;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .national-empty {
      padding: 34px 12px;
      color: #7b8ba1;
      text-align: center;
      font-weight: 700;
    }

    .national-pagination {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
    }

    .national-page-btn {
      display: inline-flex;
      min-width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid #d9e3ef;
      border-radius: 7px;
      color: #102447;
      background: #fff;
      font-weight: 800;
    }

    .national-page-btn.is-active {
      border-color: #1677ff;
      color: #fff;
      background: #1677ff;
    }

    .national-modal-mask {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: rgba(15, 31, 61, 0.36);
    }

    .national-modal-mask.open {
      display: flex;
    }

    .national-modal {
      width: min(860px, 100%);
      max-height: min(86vh, 820px);
      overflow: hidden;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 18px 48px rgba(15, 39, 72, 0.22);
    }

    .national-modal-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid #e4ebf5;
    }

    .national-modal-head h2 {
      margin: 0;
      color: #102447;
      font-size: 20px;
      line-height: 1.2;
    }

    .national-modal-close {
      display: inline-flex;
      width: 34px;
      height: 34px;
      align-items: center;
      justify-content: center;
      border: 1px solid #d9e3ef;
      border-radius: 8px;
      color: #5d6c83;
      background: #fff;
      font-size: 20px;
      line-height: 1;
    }

    .national-modal-body {
      display: grid;
      gap: 14px;
      max-height: calc(86vh - 136px);
      overflow-y: auto;
      padding: 18px 22px;
      background: #f7faff;
    }

    .national-modal-section {
      padding: 16px;
      border: 1px solid #e4ebf5;
      border-radius: 10px;
      background: #fff;
    }

    .national-modal-section h3 {
      margin: 0 0 14px;
      padding-left: 10px;
      border-left: 3px solid #1677ff;
      color: #102447;
      font-size: 16px;
      line-height: 1.2;
    }

    .national-modal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 24px;
    }

    .national-field {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-width: 0;
      font-size: 14px;
      line-height: 1.45;
    }

    .national-field span {
      color: #607089;
      font-weight: 700;
    }

    .national-field strong {
      min-width: 0;
      overflow: hidden;
      color: #102447;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .national-hit-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .national-hit-tag {
      display: inline-flex;
      align-items: center;
      height: 26px;
      padding: 0 9px;
      border-radius: 6px;
      color: #1677ff;
      background: #eaf3ff;
      font-size: 13px;
      font-style: normal;
      font-weight: 800;
    }

    .national-hit-tag.warning {
      color: #e55c1a;
      background: #fff2e8;
    }

    .national-modal-foot {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 22px;
      border-top: 1px solid #e4ebf5;
      background: #fff;
    }

    .national-toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 140;
      display: none;
      padding: 10px 14px;
      border: 1px solid #c7d7ee;
      border-radius: 8px;
      color: #174ea6;
      background: #eef5ff;
      box-shadow: 0 8px 22px rgba(15, 39, 72, 0.14);
      font-weight: 800;
    }

    .national-toast.show {
      display: block;
    }

    @media (max-width: 1280px) {
      .national-filter-card {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .national-filter-actions {
        justify-content: flex-start;
      }

      .national-filter-spacer {
        display: none;
      }
    }

    @media (max-width: 760px) {
      .national-page-head {
        display: grid;
      }

      .national-head-actions {
        padding-top: 0;
      }

      .national-modal-grid {
        grid-template-columns: 1fr;
      }

      .national-filter-card {
        grid-template-columns: 1fr;
      }

      .national-filter-field {
        width: 100%;
      }

      .national-filter-field .control {
        width: 100%;
      }

      .national-filter-actions {
        justify-content: flex-start;
      }

      .national-field {
        grid-template-columns: 86px minmax(0, 1fr);
      }
    }
  </style>
</head>

    const nationalState = {
      records: [...nationalNetworkRecords],
      page: 1,
      pageSize: 5,
      selectedIds: new Set(),
      detailId: null,
    };

    function renderNationalNetworkPage() {
      const pageContent = document.getElementById("pageContent");
      if (!pageContent) return;

      pageContent.innerHTML = `
        <section class="national-network-page">
          <div>
            <div class="national-breadcrumb">工作台 / 信息查询 / <span>全国联网查询</span></div>

              <div class="national-title-wrap">

                <div>

            </section>

            ${nationalSelect("数据来源", "nationalSource", ["请选择", "××省业务系统"])}
            ${nationalSelect("时间范围", "nationalTimeRange", ["请选择", "近7天", "近30天", "近90天"])}
            ${nationalInput("关键词", "nationalKeyword", "请输入")}
            <div class="national-filter-spacer" aria-hidden="true"></div>
            <div class="national-filter-actions">
              <button class="btn primary" type="button" id="nationalSearchBtn">查询</button>
              <button class="btn" type="button" id="nationalResetBtn">重置</button>
            </div>
          </section>

          <section class="national-result-card">
            <div class="national-card-title">
              <h2>查询结果列表</h2>
              <div class="national-title-meta">
                <span id="nationalTotalText">共 8 条</span>
                <span class="national-selected-count" id="nationalSelectedText">已选择 0 条</span>
              </div>
            </div>
            <div class="national-table-wrap" id="nationalTableWrap"></div>
            <div class="national-pagination" id="nationalPagination"></div>
          </section>
        </section>

        <div class="national-modal-mask" id="nationalDetailModal">
          <section class="national-modal" role="dialog" aria-modal="true" aria-labelledby="nationalModalTitle">
            <div class="national-modal-head">
              <h2 id="nationalModalTitle">联网查询详情</h2>
              <button class="national-modal-close" type="button" id="nationalModalClose">×</button>
            </div>
            <div class="national-modal-body" id="nationalModalBody"></div>
            <div class="national-modal-foot">
              <button class="btn" type="button" id="nationalModalCancel">关闭</button>
              <button class="btn primary" type="button" id="nationalModalExport">导出该条</button>
            </div>
          </section>
        </div>
      `;

      bindNationalEvents();
      renderNationalResults();

    function nationalInput(label, id, placeholder) {
      return `<div class="national-filter-field"><label for="${id}">${label}</label><input id="${id}" class="control" placeholder="${placeholder}" /></div>`;
    }

    function nationalSelect(label, id, options) {
      return `<div class="national-filter-field"><label for="${id}">${label}</label><select id="${id}" class="control">${options.map((item) => `<option>${item}</option>`).join("")}</select></div>`;
    }

    function bindNationalEvents() {
      document.getElementById("nationalSearchBtn").addEventListener("click", applyNationalSearch);
      document.getElementById("nationalResetBtn").addEventListener("click", resetNationalSearch);
      document.getElementById("nationalExportBtn").addEventListener("click", exportSelectedNationalRecords);
      document.getElementById("nationalModalClose").addEventListener("click", closeNationalModal);
      document.getElementById("nationalModalCancel").addEventListener("click", closeNationalModal);
      document.getElementById("nationalModalExport").addEventListener("click", () => {
        showNationalToast("已导出当前人员查询结果");
      });
      document.getElementById("nationalDetailModal").addEventListener("click", (event) => {
        if (event.target.id === "nationalDetailModal") closeNationalModal();
      });
    }

    function applyNationalSearch() {
      const name = document.getElementById("nationalName").value.trim();
      const idNo = document.getElementById("nationalIdNo").value.trim();
      const phone = document.getElementById("nationalPhone").value.trim();
      const source = document.getElementById("nationalSource").value;
      const timeRange = document.getElementById("nationalTimeRange").value;
      const keyword = document.getElementById("nationalKeyword").value.trim();

      nationalState.records = nationalNetworkRecords.filter((item) => {
        const matchName = !name || item.name.includes(name);
        const matchId = !idNo || item.idNo.includes(idNo);
        const matchPhone = !phone || item.phone.includes(phone);
        const matchSource = source === "请选择" || item.dataSource.includes(source);
        const matchTime = timeRange === "请选择" || isInNationalRange(item.recentTime, timeRange);
        const matchKeyword =
          !keyword ||
          [item.name, item.idNo, item.phone, item.dataSource, item.status, item.currentArea, item.registeredArea, item.tags.join(" ")]
            .some((value) => value.includes(keyword));
        return matchName && matchId && matchPhone && matchSource && matchTime && matchKeyword;
      });
      nationalState.page = 1;
      nationalState.selectedIds.clear();
      renderNationalResults();
    }

    function isInNationalRange(dateText, range) {
      const day = new Date(`${dateText}T00:00:00`);
      const base = new Date("2025-06-10T00:00:00");
      const diff = Math.floor((base - day) / 86400000);
      if (range === "近7天") return diff <= 7;
      if (range === "近30天") return diff <= 30;
      if (range === "近90天") return diff <= 90;
      return true;
    }

    function resetNationalSearch() {
      ["nationalSource", "nationalTimeRange"].forEach((id) => {
        document.getElementById(id).selectedIndex = 0;
      });
      ["nationalName", "nationalIdNo", "nationalPhone", "nationalKeyword"].forEach((id) => {
        document.getElementById(id).value = "";
      });
      nationalState.records = [...nationalNetworkRecords];
      nationalState.page = 1;
      nationalState.selectedIds.clear();
      renderNationalResults();
    }

    function renderNationalResults() {
      document.getElementById("nationalTotalText").textContent = `共 ${nationalState.records.length} 条`;
      document.getElementById("nationalSelectedText").textContent = `已选择 ${nationalState.selectedIds.size} 条`;
      renderNationalTable();
      renderNationalPagination();
    }

    function getNationalVisibleRows() {
      const start = (nationalState.page - 1) * nationalState.pageSize;
      return nationalState.records.slice(start, start + nationalState.pageSize);
    }

    function renderNationalTable() {
      const start = (nationalState.page - 1) * nationalState.pageSize;
      const rows = getNationalVisibleRows();
      const tableWrap = document.getElementById("nationalTableWrap");

      if (!rows.length) {
        tableWrap.innerHTML = `<div class="national-empty">暂无符合条件的查询结果</div>`;
        return;
      }

      tableWrap.innerHTML = `
        <table class="national-table">
          <thead>
            <tr>
              <th><input class="national-checkbox" type="checkbox" id="nationalSelectAll" aria-label="全选当前页" /></th>
              <th>序号</th>
              <th>姓名</th>
              <th>身份证号</th>
              <th>手机号码</th>
              <th>数据来源</th>
              <th>关联情报</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((item, index) => `
              <tr class="${nationalState.selectedIds.has(item.id) ? "is-checked" : ""}" data-national-id="${item.id}">
                <td><input class="national-checkbox" type="checkbox" data-national-check="${item.id}" ${nationalState.selectedIds.has(item.id) ? "checked" : ""} aria-label="选择${item.name}" /></td>
                <td>${start + index + 1}</td>
                <td>${item.name}</td>
                <td>${item.idNo}</td>
                <td>${item.phone}</td>
                <td>${item.dataSource}</td>
                <td><button class="national-text-btn" type="button" data-national-intel="${item.id}">${item.intelligenceCount} 条</button></td>
                <td><span class="national-status-tag ${getNationalStatusClass(item.status)}">${item.status}</span></td>
                <td><button class="national-text-btn" type="button" data-national-view="${item.id}">查看详情</button></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;

      bindNationalTableEvents(rows);
    }

    function bindNationalTableEvents(rows) {
      const selectAll = document.getElementById("nationalSelectAll");
      const visibleIds = rows.map((item) => item.id);
      const selectedVisibleCount = visibleIds.filter((id) => nationalState.selectedIds.has(id)).length;
      selectAll.checked = visibleIds.length > 0 && selectedVisibleCount === visibleIds.length;
      selectAll.indeterminate = selectedVisibleCount > 0 && selectedVisibleCount < visibleIds.length;
      selectAll.addEventListener("click", (event) => {
        event.stopPropagation();
        if (selectAll.checked) visibleIds.forEach((id) => nationalState.selectedIds.add(id));
        else visibleIds.forEach((id) => nationalState.selectedIds.delete(id));
        renderNationalResults();
      });

      document.querySelectorAll("[data-national-check]").forEach((checkbox) => {
        checkbox.addEventListener("click", (event) => {
          event.stopPropagation();
          const id = Number(checkbox.dataset.nationalCheck);
          if (checkbox.checked) nationalState.selectedIds.add(id);
          else nationalState.selectedIds.delete(id);
          renderNationalResults();
        });
      });

      document.querySelectorAll("[data-national-id]").forEach((row) => {
        row.addEventListener("click", () => openNationalDetail(Number(row.dataset.nationalId)));
      });

      document.querySelectorAll("[data-national-view]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          openNationalDetail(Number(button.dataset.nationalView));
        });
      });

      document.querySelectorAll("[data-national-intel]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const item = nationalNetworkRecords.find((record) => record.id === Number(button.dataset.nationalIntel));
          showNationalToast(`${item.name}关联情报列表待接入`);
        });
      });
    }

    function renderNationalPagination() {
      const pageCount = Math.max(1, Math.ceil(nationalState.records.length / nationalState.pageSize));
      const pagination = document.getElementById("nationalPagination");
      pagination.innerHTML = `
        <button class="national-page-btn" type="button" data-national-page="prev">上一页</button>
        ${Array.from({ length: pageCount }, (_, index) => {
          const page = index + 1;
          return `<button class="national-page-btn ${page === nationalState.page ? "is-active" : ""}" type="button" data-national-page="${page}">${page}</button>`;
        }).join("")}
        <button class="national-page-btn" type="button" data-national-page="next">下一页</button>
      `;

      pagination.querySelectorAll("[data-national-page]").forEach((button) => {
        button.addEventListener("click", () => {
          const action = button.dataset.nationalPage;
          if (action === "prev") nationalState.page = Math.max(1, nationalState.page - 1);
          else if (action === "next") nationalState.page = Math.min(pageCount, nationalState.page + 1);
          else nationalState.page = Number(action);
          renderNationalResults();
        });
      });
    }

    function openNationalDetail(id) {
      const item = nationalNetworkRecords.find((record) => record.id === id);
      if (!item) return;
      nationalState.detailId = id;
      document.getElementById("nationalModalBody").innerHTML = `
        <section class="national-modal-section">
          <h3>基础信息</h3>
          <div class="national-modal-grid">
            ${nationalField("姓名", item.name)}
            ${nationalField("性别", item.gender)}
            ${nationalField("出生日期", item.birthday)}
            ${nationalField("身份证号", item.idNo)}
            ${nationalField("手机号码", item.phone)}
            ${nationalField("户籍地", item.registeredArea)}
            ${nationalField("当前地区", item.currentArea)}
          </div>
        </section>
        <section class="national-modal-section">
          <h3>联网信息</h3>
          <div class="national-modal-grid">
            ${nationalField("数据来源", item.dataSource)}
            ${nationalField("更新时间", item.updatedAt)}
            ${nationalField("关联情报", `${item.intelligenceCount} 条`)}
            <div class="national-field"><span>命中标签</span><div class="national-hit-tags">${renderNationalTags(item.tags)}</div></div>
            ${nationalField("风险提示", item.risk)}
            ${nationalField("状态", item.status)}
          </div>
        </section>
        <section class="national-modal-section">
          <h3>查询轨迹</h3>
          <div class="national-modal-grid">
            ${nationalField("最近出现地区", item.recentArea)}
            ${nationalField("最近活动时间", item.recentTime)}
            ${nationalField("历史查询次数", item.queryCount)}
            ${nationalField("近30天更新次数", item.updateCount)}
          </div>
        </section>
      `;
      document.getElementById("nationalDetailModal").classList.add("open");
    }

    function closeNationalModal() {
      document.getElementById("nationalDetailModal").classList.remove("open");
    }

    function exportSelectedNationalRecords() {
      const count = nationalState.selectedIds.size;
      if (!count) {
        showNationalToast("请先选择需要导出的查询结果");
        return;
      }
      showNationalToast(`已导出 ${count} 条查询结果`);
    }

    function nationalField(label, value) {
      return `<div class="national-field"><span>${label}</span><strong title="${value}">${value}</strong></div>`;
    }

    function renderNationalTags(tags) {
      return tags.map((tag) => `<em class="national-hit-tag ${tag === "重点关注" ? "warning" : ""}">${tag}</em>`).join("");
    }

    function getNationalStatusClass(status) {
      if (status === "已关联") return "linked";
      if (status === "待核验") return "pending";
      return "unlinked";
    }

    function showNationalToast(text) {
      let toast = document.getElementById("nationalToast");
      if (!toast) {
        toast = document.createElement("div");
        toast.id = "nationalToast";
        toast.className = "national-toast";
        document.body.appendChild(toast);
      }
      toast.textContent = text;
      toast.classList.add("show");
      window.clearTimeout(showNationalToast.timer);
      showNationalToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1600);
    }

    renderNationalNetworkPage();
  </script>
</body>
</html>
