--- #################### 注册中心 + 配置中心相关配置 ####################

spring:
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848 # Nacos 服务器地址
      username: nacos
      password: nacos-admin
      discovery: # 【配置中心】配置项
        namespace: dev # 命名空间。这里使用 dev 开发环境
        group: DEFAULT_GROUP # 使用的 Nacos 配置分组，默认为 DEFAULT_GROUP
      config: # 【注册中心】配置项
        namespace: dev # 命名空间。这里使用 dev 开发环境
        group: DEFAULT_GROUP # 使用的 Nacos 配置分组，默认为 DEFAULT_GROUP
    gateway:
      routes:
        # 1. 优先匹配 search-server 微服务
        - id: search-admin-api
          uri: grayLb://search-server
          predicates:
            - Path=/admin-api/search/**
          filters:
            - RewritePath=/admin-api/search/v3/api-docs, /v3/api-docs
        # 2. 兜底转发至本地单体应用 yudao-server (18080 端口)
        - id: monolithic-backend-admin-api
          uri: http://127.0.0.1:18080
          predicates:
            - Path=/admin-api/**
        - id: monolithic-backend-app-api
          uri: http://127.0.0.1:18080
          predicates:
            - Path=/app-api/**
        - id: monolithic-backend-websocket
          uri: ws://127.0.0.1:18080
          predicates:
            - Path=/infra/ws/**
        - id: monolithic-backend-admin
          uri: http://127.0.0.1:18080
          predicates:
            - Path=/admin/**
        - id: monolithic-backend-jmreport
          uri: http://127.0.0.1:18080
          predicates:
            - Path=/jmreport/**, /drag/**, /jimubi/**

--- #################### 监控相关配置 ####################

# Actuator 监控端点的配置项
management:
  endpoints:
    web:
      base-path: /actuator # Actuator 提供的 API 接口的根目录。默认为 /actuator
      exposure:
        include: '*' # 需要开放的端点。默认值只打开 health 和 info 两个端点。通过设置 * ，可以开放所有端点。

# Spring Boot Admin 配置项
spring:
  boot:
    admin:
      # Spring Boot Admin Client 客户端的相关配置
      client:
        instance:
          service-host-type: IP # 注册实例时，优先使用 IP [IP, HOST_NAME, CANONICAL_HOST_NAME]
        username: admin
        password: admin

# 日志文件配置
logging:
  level:
    org.springframework.context.support.PostProcessorRegistrationDelegate: ERROR # TODO 芋艿：先禁用，Spring Boot 3.X 存在部分错误的 WARN 提示

